name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit and integration tests
        run: go test ./...
      - name: Race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: End-to-end demo
        run: go run ./cmd/meld demo

  typescript:
    name: TypeScript and React
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Type and package checks
        run: pnpm check
      - name: SDK tests
        run: pnpm test
      - name: Browser example production build
        run: pnpm build:example
