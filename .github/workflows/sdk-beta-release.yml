name: SDK beta release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: sdk-beta-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm beta packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Re-run beta quality and documentation gates
        run: |
          pnpm quality:sdk
          pnpm docs:build
      - name: Verify and publish beta tarballs with npm provenance
        run: pnpm release:sdk:beta
