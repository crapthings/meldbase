name: SDK compatibility

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sdk-compatibility.yml"
      - "docs/**"
      - "examples/realtime-todos/**"
      - "scripts/test-sdk-browser.mjs"
      - "scripts/check-sdk-release-readiness.mjs"
      - "scripts/verify-sdk-api-docs.mjs"
      - "scripts/verify-sdk-packages.mjs"
      - "sdk/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "typedoc.json"
      - "typedoc.tsconfig.json"
  pull_request:
    paths:
      - ".github/workflows/sdk-compatibility.yml"
      - "docs/**"
      - "examples/realtime-todos/**"
      - "scripts/test-sdk-browser.mjs"
      - "scripts/check-sdk-release-readiness.mjs"
      - "scripts/verify-sdk-api-docs.mjs"
      - "scripts/verify-sdk-packages.mjs"
      - "sdk/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "typedoc.json"
      - "typedoc.tsconfig.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: SDK quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.34.5
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting, lint, coverage, and release policy
        run: pnpm quality:sdk

  sdk:
    name: SDK on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.34.5
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check and test SDK packages
        run: |
          pnpm --filter @meldbase/client check
          pnpm --filter @meldbase/client build
          pnpm --filter @meldbase/worker check
          pnpm --filter @meldbase/react check
          pnpm test
      - name: Verify npm-installed tarballs and TypeScript consumers
        run: pnpm pack:check
      - name: Build browser example
        run: pnpm build:example
      - name: Verify Chrome is available
        if: matrix.node == 24
        run: google-chrome --version || google-chrome-stable --version
      - name: Verify real browser HTTP, realtime, and hydration
        if: matrix.node == 24
        run: pnpm test:sdk:browser
